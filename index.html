<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="A minimalist Pomodoro timer with ambient sounds and responsive layout" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23d4af37;stop-opacity:1' /><stop offset='100%' style='stop-color:%23c89f2f;stop-opacity:1' /></linearGradient></defs><rect fill='url(%23grad)' width='192' height='192' rx='48'/><circle cx='96' cy='96' r='75' fill='%230a0a0a'/><circle cx='96' cy='96' r='66' fill='url(%23grad)'/><circle cx='96' cy='96' r='62' fill='%230a0a0a'/><g stroke='%23d4af37' stroke-width='4.5' fill='none'><line x1='96' y1='37' x2='96' y2='54'/><line x1='96' y1='138' x2='96' y2='155'/><line x1='37' y1='96' x2='54' y2='96'/><line x1='138' y1='96' x2='155' y2='96'/></g><text x='96' y='112' font-size='48' font-weight='bold' text-anchor='middle' fill='%23d4af37' font-family='system-ui, -apple-system'>25</text></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='iosgrad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23d4af37;stop-opacity:1' /><stop offset='100%' style='stop-color:%23c89f2f;stop-opacity:1' /></linearGradient></defs><rect fill='url(%23iosgrad)' width='180' height='180' rx='45'/><circle cx='90' cy='90' r='70' fill='%230a0a0a'/><circle cx='90' cy='90' r='62' fill='url(%23iosgrad)'/><circle cx='90' cy='90' r='58' fill='%230a0a0a'/><g stroke='%23d4af37' stroke-width='4' fill='none'><line x1='90' y1='32' x2='90' y2='48'/><line x1='90' y1='132' x2='90' y2='148'/><line x1='32' y1='90' x2='48' y2='90'/><line x1='132' y1='90' x2='148' y2='90'/></g><text x='90' y='105' font-size='42' font-weight='bold' text-anchor='middle' fill='%23d4af37' font-family='system-ui, -apple-system'>25</text></svg>" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pomodoro" />
  <title>Pomodoro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="display-card">
      <div class="mode-row">
        <button class="mode-btn active" data-mode="work">pomodoro</button>
        <button class="mode-btn" data-mode="short">short break</button>
        <button class="mode-btn" data-mode="long">long break</button>
      </div>
      <div class="timer-face" id="timerFace">25:00</div>
      <div class="action-row">
        <button id="startButton" class="action-pill">start</button>
        <button id="resetButton" class="icon-btn" title="Reset">⟲</button>
        <button id="settingsButton" class="icon-btn" title="Settings">⚙</button>
      </div>
      <div class="footer-note">tap the screen to pause / resume</div>
    </div>
  </div>

  <div class="settings-overlay hidden" id="settingsOverlay" aria-hidden="true">
    <div class="settings-panel">
      <div class="settings-header">
        <div>
          <div class="settings-title">Settings</div>
          <div class="settings-subtitle">Edit timer lengths and sound options</div>
        </div>
        <button id="closeSettings" class="icon-btn small" title="Close settings">✕</button>
      </div>

      <div class="settings-grid">
        <label class="settings-field">
          <span>pomodoro</span>
          <input id="pomodoroInput" type="number" min="1" max="180" />
        </label>
        <label class="settings-field">
          <span>short break</span>
          <input id="shortInput" type="number" min="1" max="60" />
        </label>
        <label class="settings-field">
          <span>long break</span>
          <input id="longInput" type="number" min="1" max="120" />
        </label>
      </div>

      <div class="toggle-row">
        <label class="toggle">
          <span>ambient sound during pomodoro</span>
          <input id="ambientToggle" type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="settings-field">
        <span>sound type</span>
        <select id="ambientType">
          <option value="rain">rain</option>
          <option value="bonfire">bonfire</option>
          <option value="lofi">lofi</option>
          <option value="lofi-beats">lofi beats</option>
        </select>
      </div>

      <div class="settings-field">
        <span>ambient volume</span>
        <input id="ambientVolume" type="range" min="0" max="100" />
      </div>

      <div class="toggle-row">
        <label class="toggle">
          <span>finish sound</span>
          <input id="finishToggle" type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="settings-actions">
        <button id="saveSettings" class="action-pill">save changes</button>
        <button id="resetAll" class="ghost-pill">reset all</button>
      </div>

      <div class="settings-note">Changes are stored locally in your browser.</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
